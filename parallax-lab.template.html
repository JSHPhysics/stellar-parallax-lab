<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Parallax Laboratory</title>
<style id="inline-fonts">/* __FONTS_CSS__ */</style>
<style>
:root {
  --bg: #0a0e1a;
  --surface: #141928;
  --surface-alt: #1c2338;
  --surface-hi: #252d45;
  --border: #2a3148;
  --border-bright: #3a4265;
  --text: #e8e6e1;
  --text-muted: #8a91a5;
  --text-dim: #5c6378;
  --accent: #ffd060;
  --accent-soft: #ffe8a8;
  --accent-dim: #8b6f2e;
  --jan-color: #8bc0e6;
  --jul-color: #f0b878;
  --target-color: #ff6b6b;
  --target-glow: rgba(255, 107, 107, 0.3);
  --success: #6ee69e;
  --danger: #ff6b6b;
  --info: #7aa8ff;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Public Sans', -apple-system, sans-serif;
  overflow: hidden;
  font-size: 15px;
  -webkit-text-size-adjust: 100%;
}

body {
  background:
    radial-gradient(ellipse at top, #0f1528 0%, #0a0e1a 60%),
    var(--bg);
}

.app {
  display: grid;
  grid-template-rows: auto 1fr auto;
  height: 100vh;
}

/* ---- Header ---- */
header {
  padding: 0.9rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(10, 14, 26, 0.6);
  backdrop-filter: blur(8px);
  gap: 1rem;
}

.brand { display: flex; align-items: baseline; gap: 0.75rem; }
.brand h1 {
  font-family: 'Fraunces', serif; font-weight: 500;
  font-size: 1.35rem; letter-spacing: -0.01em;
}
.brand .subtitle {
  font-size: 0.75rem; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.15em;
}

.header-meta {
  display: flex; align-items: center; gap: 1rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  color: var(--text-muted);
}
.header-meta .scenario-chip {
  color: var(--accent-soft);
  background: var(--surface-alt);
  border: 1px solid var(--border);
  padding: 0.25rem 0.6rem;
  border-radius: 3px;
}
.header-meta .home-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 0.35rem 0.65rem;
  cursor: pointer;
  font-size: 0.72rem;
  font-family: 'JetBrains Mono', monospace;
  border-radius: 3px;
}
.header-meta .home-btn:hover { color: var(--accent-soft); border-color: var(--border-bright); }

.step-indicator {
  display: flex; gap: 0.35rem; align-items: center;
}
.step-dot {
  width: 28px; height: 28px;
  border: 1px solid var(--border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.76rem;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer; transition: all 0.2s;
  background: var(--surface);
}
.step-dot:hover { border-color: var(--border-bright); }
.step-dot.active {
  background: var(--accent); color: var(--bg);
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(255, 208, 96, 0.15);
}
.step-dot.completed {
  background: var(--surface-alt); color: var(--accent-soft);
  border-color: var(--accent-dim);
}
.step-connector { width: 10px; height: 1px; background: var(--border); }

/* ---- Main layout ---- */
.main {
  display: grid;
  grid-template-columns: 380px 1fr;
  overflow: hidden;
}

/* ---- Sidebar ---- */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 1.6rem 1.6rem 1.4rem;
  overflow-y: auto;
  display: flex; flex-direction: column;
}

.step-label {
  color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-bottom: 0.5rem;
}
.sidebar h2 {
  font-family: 'Fraunces', serif; font-weight: 500;
  font-size: 1.35rem; letter-spacing: -0.01em;
  line-height: 1.22; margin-bottom: 0.9rem;
}
.sidebar p {
  color: var(--text); margin-bottom: 0.75rem;
  line-height: 1.55; font-size: 0.91rem;
}
.sidebar p.muted { color: var(--text-muted); font-size: 0.85rem; }
.sidebar ul {
  margin-left: 1rem; margin-bottom: 0.75rem;
  color: var(--text); line-height: 1.55; font-size: 0.91rem;
}
.sidebar ul li { margin-bottom: 0.3rem; }
.sidebar .callout {
  background: var(--surface-alt);
  border-left: 2px solid var(--accent);
  padding: 0.7rem 0.85rem;
  margin-bottom: 0.75rem;
  border-radius: 0 4px 4px 0;
  font-size: 0.87rem;
  line-height: 1.5;
  color: var(--text);
}
.sidebar .callout strong {
  color: var(--accent-soft); font-weight: 500;
}
.sidebar .callout.info {
  border-left-color: var(--info);
}
.sidebar code {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  padding: 0.1rem 0.35rem;
  border-radius: 3px;
  font-size: 0.88em;
  color: var(--accent-soft);
}
.sidebar .prompt {
  font-family: 'Fraunces', serif;
  font-size: 1.05rem;
  color: var(--text);
  line-height: 1.45;
  margin-bottom: 0.9rem;
}
.sidebar .practice-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  color: var(--text-muted);
  line-height: 1.7;
  margin-top: 0.6rem;
  padding: 0.6rem 0.8rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg);
}

.nav-buttons {
  margin-top: auto;
  padding-top: 1.4rem;
  display: flex; gap: 0.5rem;
}

/* ---- Workspace ---- */
.workspace {
  display: flex; flex-direction: column;
  padding: 1.25rem 1.4rem;
  gap: 0.9rem;
  overflow: auto;
}

.canvas-wrap {
  background: #03060d;
  border: 1px solid var(--border);
  border-radius: 6px;
  position: relative;
  width: 800px; max-width: 100%;
  margin: 0 auto;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  overflow: hidden;
}
canvas {
  display: block; cursor: crosshair; width: 100%;
  /* Default touch behaviour: allow page scroll (pan) AND pinch-zoom so mobile
     users can (a) scroll past the canvas and (b) zoom in on star fields for
     more accurate targeting.  We switch this to 'pinch-zoom' only in step 3,
     where free-form single-finger dragging is the primary interaction. */
  touch-action: manipulation;
  -webkit-user-select: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;         /* iOS: no "Save Image" long-press menu */
}

.canvas-label {
  position: absolute; top: 0.55rem; left: 0.6rem;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  padding: 0.3rem 0.65rem; border-radius: 3px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.1em;
  pointer-events: none;
}
.canvas-status {
  position: absolute; top: 0.55rem; right: 0.6rem;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  padding: 0.3rem 0.65rem; border-radius: 3px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem; pointer-events: none;
}
.canvas-status.aligned { color: var(--success); }
.canvas-status.misaligned { color: var(--text-muted); }

.canvas-attribution {
  position: absolute; bottom: 0.5rem; right: 0.65rem;
  background: rgba(0,0,0,0.55);
  padding: 0.18rem 0.45rem;
  border-radius: 3px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.03em;
  color: rgba(220, 225, 240, 0.75);
  pointer-events: none;
}

/* ---- Toolbar ---- */
.toolbar {
  display: flex; gap: 0.4rem; flex-wrap: wrap;
  align-items: center;
  width: 800px; max-width: 100%; margin: 0 auto;
}
.toolbar .divider {
  width: 1px; height: 22px; background: var(--border);
  margin: 0 0.2rem;
}
.toolbar .label {
  color: var(--text-muted); font-size: 0.78rem;
  margin-right: 0.25rem;
}

button {
  background: var(--surface-alt); color: var(--text);
  border: 1px solid var(--border);
  padding: 0.45rem 0.85rem;
  border-radius: 4px; cursor: pointer;
  font-family: inherit; font-size: 0.83rem;
  transition: all 0.15s;
  display: inline-flex; align-items: center; gap: 0.4rem;
  min-height: 38px;
  -webkit-tap-highlight-color: transparent;
}
button:hover:not(:disabled) {
  background: var(--surface-hi); border-color: var(--border-bright);
}
button.primary {
  background: var(--accent); color: var(--bg);
  border-color: var(--accent); font-weight: 500;
}
button.primary:hover:not(:disabled) { background: var(--accent-soft); }
button.ghost { background: transparent; }
button.active {
  background: var(--info); color: var(--bg);
  border-color: var(--info); font-weight: 500;
}
button:disabled { opacity: 0.35; cursor: not-allowed; }

/* ---- Readout panel ---- */
.readout {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 1rem;
  background: var(--surface);
  padding: 0.8rem 1.15rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  width: 800px; max-width: 100%; margin: 0 auto;
}
.measurement-label {
  color: var(--text-muted); font-size: 0.68rem;
  text-transform: uppercase; letter-spacing: 0.12em;
  margin-bottom: 0.3rem; font-weight: 500;
}
.measurement-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.02rem; color: var(--text);
}
.measurement-value.highlight { color: var(--accent); font-weight: 500; }
.measurement-value.dim { color: var(--text-dim); }

/* ---- Calculation panel ---- */
.calc-panel, .result-panel {
  width: 800px; max-width: 100%; margin: 0 auto;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1.3rem 1.4rem;
}
.calc-panel h3, .result-panel h3 {
  font-family: 'Fraunces', serif; font-weight: 500;
  font-size: 1.1rem; margin-bottom: 0.9rem;
  color: var(--accent-soft);
}
.calc-step {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 1rem; align-items: center;
  padding: 0.7rem 0;
  border-bottom: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.88rem;
}
.calc-step:last-of-type { border-bottom: none; }
.calc-label {
  color: var(--text-muted);
  font-family: 'Public Sans', sans-serif; font-size: 0.86rem;
}
.calc-formula { color: var(--text); }
.calc-formula .var { color: var(--info); }
.calc-formula .num { color: var(--accent-soft); }
.calc-result {
  color: var(--accent); font-weight: 500; text-align: right;
}
.input-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 1rem; align-items: center;
  padding: 1rem 0 0.2rem;
  border-top: 2px solid var(--border-bright);
  margin-top: 0.5rem;
}
.input-row label { color: var(--text); font-size: 0.93rem; }
.input-row input {
  background: var(--bg);
  border: 1px solid var(--border-bright);
  color: var(--accent);
  padding: 0.45rem 0.7rem;
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.98rem; width: 100px; text-align: right;
}
.input-row input:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(255, 208, 96, 0.2);
}

/* ---- Results ---- */
.result-card {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 1.4rem; margin-bottom: 1rem;
}
.result-tile {
  background: var(--surface-alt);
  padding: 0.9rem 1.1rem;
  border-radius: 4px;
  border-left: 3px solid var(--border-bright);
}
.result-tile.student { border-left-color: var(--info); }
.result-tile.truth   { border-left-color: var(--success); }
.result-tile .label {
  font-size: 0.72rem; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.12em;
  margin-bottom: 0.35rem;
}
.result-tile .value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.35rem; color: var(--text);
}
.error-bar {
  margin-top: 1rem; padding: 0.7rem 1rem;
  background: var(--surface-alt); border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.88rem; color: var(--text-muted);
}
.error-bar .error-value {
  color: var(--accent); font-weight: 500;
}

/* ---- Landing ---- */
.landing {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, #0a0e1a 0%, #0f1528 100%);
  padding: 2.5rem 2rem;
  overflow-y: auto;
  display: flex; flex-direction: column;
  align-items: center;
}
.landing-inner {
  max-width: 1100px; width: 100%;
  margin: 0 auto;
}
.landing-head {
  text-align: center;
  margin-bottom: 2.2rem;
}
.landing-head h1 {
  font-family: 'Fraunces', serif; font-weight: 500;
  font-size: 2.2rem; letter-spacing: -0.01em;
  margin-bottom: 0.4rem;
}
.landing-head .subtitle {
  color: var(--text-muted); font-size: 0.85rem;
  text-transform: uppercase; letter-spacing: 0.2em;
}
.landing-head .blurb {
  max-width: 640px; margin: 1.1rem auto 0;
  color: var(--text); line-height: 1.55;
  font-size: 0.96rem;
}
.landing-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2rem;
}
.landing-col h3 {
  font-family: 'Fraunces', serif; font-weight: 500;
  font-size: 1rem; color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.18em;
  margin-bottom: 0.8rem;
  padding-left: 0.2rem;
}

.card-learn {
  background: linear-gradient(135deg, #19203a 0%, #1c2338 100%);
  border: 1px solid var(--border-bright);
  border-radius: 8px;
  padding: 1.6rem 1.6rem 1.4rem;
  cursor: pointer;
  transition: all 0.2s;
  position: relative; overflow: hidden;
  min-height: 260px;
  display: flex; flex-direction: column;
}
.card-learn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 85% 15%,
    rgba(255, 208, 96, 0.08) 0%,
    transparent 55%);
  pointer-events: none;
}
.card-learn:hover {
  border-color: var(--accent);
  box-shadow: 0 8px 30px rgba(255, 208, 96, 0.1);
  transform: translateY(-2px);
}
.card-learn .name {
  font-family: 'Fraunces', serif; font-size: 1.5rem;
  color: var(--accent-soft); margin-bottom: 0.3rem;
}
.card-learn .desc {
  color: var(--text); line-height: 1.5;
  font-size: 0.92rem; margin-bottom: 0.9rem;
}
.card-learn .stats {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem; color: var(--text-muted);
  margin-top: auto; display: flex; gap: 1.5rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
}
.card-learn .stats strong { color: var(--accent-soft); font-weight: 500; }
.card-learn .cta {
  align-self: flex-start;
  margin-top: 0.8rem;
  color: var(--accent);
  font-size: 0.88rem;
  font-weight: 500;
}

.practice-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.8rem;
}
.card-practice {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1rem 1.05rem;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  min-height: 125px;
  display: flex; flex-direction: column;
}
.card-practice:hover {
  border-color: var(--accent);
  background: var(--surface-hi);
}
.card-practice .name {
  font-family: 'Fraunces', serif;
  font-size: 1.05rem;
  color: var(--accent-soft);
  margin-bottom: 0.2rem;
}
.card-practice .meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-top: auto;
  padding-top: 0.6rem;
  line-height: 1.5;
}
.card-practice .difficulty {
  display: inline-block;
  padding: 0.1rem 0.4rem;
  border-radius: 3px;
  font-size: 0.68rem;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 0.4rem;
  align-self: flex-start;
}
.card-practice .difficulty.easy   { background: rgba(110, 230, 158, 0.15); color: var(--success); }
.card-practice .difficulty.medium { background: rgba(122, 168, 255, 0.15); color: var(--info); }
.card-practice .difficulty.hard   { background: rgba(255, 107, 107, 0.15); color: var(--danger); }

.landing-foot {
  margin-top: 2.2rem;
  padding-top: 1.4rem;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-muted);
}
.landing-foot a {
  color: var(--accent-soft); text-decoration: none;
  cursor: pointer;
}
.landing-foot a:hover { text-decoration: underline; }

/* ---- Modal ---- */
.modal-overlay {
  position: absolute; inset: 0;
  background: rgba(0, 0, 0, 0.75);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  padding: 2rem;
  z-index: 100;
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border-bright);
  border-radius: 8px;
  padding: 2rem 2.2rem;
  max-width: 640px; width: 100%;
  max-height: 85vh; overflow-y: auto;
}
.modal h2 {
  font-family: 'Fraunces', serif; font-weight: 500;
  font-size: 1.4rem; margin-bottom: 1rem;
  color: var(--accent-soft);
}
.modal p {
  color: var(--text); line-height: 1.55;
  font-size: 0.94rem; margin-bottom: 0.8rem;
}
.modal .modal-close {
  position: sticky; bottom: 0; margin-top: 1rem;
}

/* ---- Footer ---- */
.app-footer {
  padding: 0.55rem 1.5rem;
  border-top: 1px solid var(--border);
  background: rgba(10, 14, 26, 0.5);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  color: var(--text-dim);
  display: flex; justify-content: space-between;
  align-items: center;
}

/* ---- Scrollbar ---- */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-bright); }

/* ---- Responsive ---- */

/* Tablet landscape / narrow desktop (iPad Pro landscape: 1194px)  */
@media (max-width: 1200px) {
  .main { grid-template-columns: 330px 1fr; }
  .canvas-wrap, .toolbar, .readout, .calc-panel, .result-panel { width: 100%; }
  canvas { max-width: 100%; height: auto; }
}

/* Tablet (iPad portrait ≤ 820 or iPad landscape small side) */
@media (max-width: 1024px) {
  .main { grid-template-columns: 300px 1fr; }
  .sidebar { padding: 1.3rem 1.3rem 1.1rem; }
  header { padding: 0.8rem 1.1rem; }
  .brand h1 { font-size: 1.22rem; }
  .brand .subtitle { font-size: 0.68rem; }
}

/* iPad portrait / large phone — switch to stacked layout with natural scroll.
   Key detail: use overflow:visible (not auto) on html/body so the browser's
   native document-level scroll handles touch-swipes.  Setting overflow:auto
   creates element-level scroll containers that are flaky with touch on mobile
   Chrome/Brave/Safari. */
@media (max-width: 820px) {
  html, body { overflow: visible; height: auto; min-height: 100%; }
  body { -webkit-overflow-scrolling: touch; }
  .app { height: auto; min-height: 100vh; grid-template-rows: auto auto auto; overflow: visible; }
  header {
    flex-wrap: wrap; gap: 0.55rem;
    padding: 0.7rem 1rem;
    position: sticky; top: 0; z-index: 20;
  }
  .brand h1 { font-size: 1.15rem; }
  .brand .subtitle { display: none; }
  .header-meta { order: 3; width: 100%; justify-content: flex-start; flex-wrap: wrap; }
  .step-indicator { order: 2; }
  .main {
    display: flex; flex-direction: column;
    overflow: visible;
  }
  .sidebar {
    border-right: none;
    border-bottom: 1px solid var(--border);
    max-height: none;
    overflow-y: visible;
    padding: 1.1rem 1.1rem 1rem;
  }
  .sidebar h2 { font-size: 1.2rem; }
  .workspace {
    overflow: visible;
    padding: 0.9rem 1rem 1.2rem;
    gap: 0.8rem;
  }
  .landing {
    position: relative; inset: auto;
    padding: 2rem 1.2rem;
    overflow: visible;     /* no element-level scroll container on mobile */
    display: block;        /* flex centering isn't needed when page scrolls */
  }
  .landing-inner { width: 100%; }
  .landing-head h1 { font-size: 1.85rem; }
  .landing-grid { grid-template-columns: 1fr; gap: 1.4rem; }
  .practice-grid { grid-template-columns: 1fr 1fr; }
  .nav-buttons { padding-top: 1.1rem; }
  /* Buttons on touch: full min tap target */

}

<body>

<div class="app">
  <header>
    <div class="brand">
      <h1>Stellar Parallax Laboratory</h1>
      <span class="subtitle">A-Level Physics · Edexcel 157</span>
    </div>
    <div class="header-meta" id="headerMeta"></div>
    <div class="step-indicator" id="stepIndicator"></div>
  </header>

  <div class="main" id="mainArea">
    <!-- Dynamically filled: either landing, or sidebar + workspace -->
  </div>

  <div class="app-footer">
    <span>Digitized Sky Survey / STScI / AURA / UK Schmidt Telescope &nbsp;·&nbsp; Gaia DR3 catalogue</span>
    <span id="footerRight"></span>
  </div>
</div>

<script>
"use strict";

// ============================================================
// MANIFEST (injected by build_html.py from manifest.json)
// ============================================================
const MANIFEST = /* __MANIFEST_JSON__ */ {"stars": []};

// ============================================================
// STATE
// ============================================================
const state = {
  mode: 'landing',          // 'landing' | 'walkthrough' | 'practice'
  scenarioKey: null,
  scenario: null,
  step: 1,
  maxStep: 1,

  // Tinted canvases (per scenario)
  imgReady: false,
  janCanvas: null,
  julCanvas: null,

  // Alignment state
  julOffset: { x: 0, y: 0 },
  julDrag: { x: 0, y: 0 },
  isDraggingImage: false,
  dragStart: null,

  // Measurements
  targetMark1: null,
  targetMark2: null,
  refMarkA: null,
  refMarkB: null,
  placingMode: null,         // 'target1' | 'target2' | 'refA' | 'refB'

  // Viewing controls
  showJan: true,
  showJul: true,
  blinkActive: false,
  blinkFrame: 'jan',

  // Answer
  studentDistance: null,
};
let blinkInterval = null;
let canvas, ctx;

// ============================================================
// IMAGE TINTING (runtime)
// ============================================================
const JAN_TINT = [0.55, 0.78, 1.00];   // cool blue
const JUL_TINT = [1.00, 0.78, 0.50];   // warm amber

function tintCanvasFromImage(img, tint) {
  const W = img.naturalWidth, H = img.naturalHeight;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const cx = c.getContext('2d');
  cx.drawImage(img, 0, 0);
  const data = cx.getImageData(0, 0, W, H);
  const d = data.data;
  const [tr, tg, tb] = tint;
  for (let i = 0; i < d.length; i += 4) {
    const v = d[i]; // grayscale, R=G=B
    d[i]   = Math.min(255, v * tr);
    d[i+1] = Math.min(255, v * tg);
    d[i+2] = Math.min(255, v * tb);
    // alpha stays 255
  }
  cx.putImageData(data, 0, 0);
  return c;
}

function loadScenarioImage(scenario) {
  state.imgReady = false;
  state.janCanvas = null;
  state.julCanvas = null;

  const img = new Image();
  img.onload = () => {
    state.janCanvas = tintCanvasFromImage(img, JAN_TINT);
    state.julCanvas = tintCanvasFromImage(img, JUL_TINT);
    state.imgReady = true;
    renderAll();
  };
  img.onerror = () => { console.error("Image failed to load for", scenario.key); };
  img.src = "data:image/png;base64," + scenario.image_base64;
}

// ============================================================
// SCENARIO SETUP
// ============================================================
function getScenario(key) {
  return MANIFEST.stars.find(s => s.key === key);
}

function startScenario(key, mode) {
  const scn = getScenario(key);
  if (!scn) return console.error("Unknown scenario", key);
  state.scenarioKey = key;
  state.scenario = scn;
  state.mode = mode;
  state.step = 1;
  state.maxStep = 1;

  // Reset measurements/alignment
  state.targetMark1 = null;
  state.targetMark2 = null;
  state.refMarkA = null;
  state.refMarkB = null;
  state.placingMode = null;
  state.studentDistance = null;
  state.julDrag = { x: 0, y: 0 };

  // Random pointing offset for the July epoch (same as the original sim)
  state.julOffset = {
    x: 30 + Math.floor(Math.random() * 30),    // 30-60 px
    y: 15 + Math.floor(Math.random() * 15),    // 15-30 px
  };
  state.showJan = true;
  state.showJul = true;
  state.blinkActive = false;
  state.blinkFrame = 'jan';
  if (blinkInterval) { clearInterval(blinkInterval); blinkInterval = null; }

  loadScenarioImage(scn);
  buildMainArea();
  renderAll();
}

function goHome() {
  state.mode = 'landing';
  state.scenarioKey = null;
  state.scenario = null;
  if (blinkInterval) { clearInterval(blinkInterval); blinkInterval = null; }
  buildMainArea();
  renderAll();
}

// ============================================================
// STAR FIELD RENDERING
// ============================================================
function renderStarField() {
  if (!ctx) return;
  ctx.save();
  ctx.fillStyle = '#03060d';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.restore();

  if (!state.imgReady || !state.scenario) return;

  const showJan = state.blinkActive ? (state.blinkFrame === 'jan') : state.showJan;
  const showJul = state.blinkActive ? (state.blinkFrame === 'jul') : state.showJul;
  const bothShown = showJan && showJul;

  // Draw DSS tinted images.  When both epochs are visible, use 'lighter'
  // blend so aligned stars sum to near-white (classic blink-comparator look)
  // and misaligned stars remain split into blue/amber halves.
  if (showJan) {
    ctx.save();
    if (bothShown) ctx.globalCompositeOperation = 'lighter';
    ctx.drawImage(state.janCanvas, 0, 0);
    ctx.restore();
  }
  if (showJul) {
    ctx.save();
    if (bothShown) ctx.globalCompositeOperation = 'lighter';
    const dx = state.julOffset.x + state.julDrag.x;
    const dy = state.julOffset.y + state.julDrag.y;
    ctx.drawImage(state.julCanvas, dx, dy);
    ctx.restore();
  }

  // Overlay: synthetic target markers (what the student measures)
  const s = state.scenario;
  if (showJan) drawTargetSprite(s.target_jan.x, s.target_jan.y, JAN_TINT);
  if (showJul) {
    const dx = state.julOffset.x + state.julDrag.x;
    const dy = state.julOffset.y + state.julDrag.y;
    drawTargetSprite(s.target_jul.x + dx, s.target_jul.y + dy, JUL_TINT);
  }

  // Overlay: reference star A/B labels
  drawRefLabel('A', s.ref_A, showJan, showJul);
  drawRefLabel('B', s.ref_B, showJan, showJul);

  // Student-placed markers
  drawUserMarkers();

  // Alignment-OK border (step 3)
  if (state.step === 3) {
    const err = Math.hypot(state.julOffset.x + state.julDrag.x,
                           state.julOffset.y + state.julDrag.y);
    if (err < 3) {
      ctx.save();
      ctx.strokeStyle = 'rgba(110, 230, 158, 0.5)';
      ctx.lineWidth = 2;
      ctx.strokeRect(2, 2, canvas.width - 4, canvas.height - 4);
      ctx.restore();
    }
  }
}

function drawTargetSprite(x, y, tint) {
  const r = 6;
  const [tr, tg, tb] = tint;
  const col = `rgb(${Math.round(tr*255)}, ${Math.round(tg*255)}, ${Math.round(tb*255)})`;
  const colSoft = `rgba(${Math.round(tr*255)}, ${Math.round(tg*255)}, ${Math.round(tb*255)}, 0.35)`;
  const colZero = `rgba(${Math.round(tr*255)}, ${Math.round(tg*255)}, ${Math.round(tb*255)}, 0)`;

  ctx.save();
  // Glow
  const grad = ctx.createRadialGradient(x, y, 0, x, y, r * 4.5);
  grad.addColorStop(0, col);
  grad.addColorStop(0.35, colSoft);
  grad.addColorStop(1, colZero);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, r * 4.5, 0, Math.PI * 2);
  ctx.fill();
  // Core
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  // Bright centre
  ctx.fillStyle = '#ffffff';
  ctx.globalAlpha = 0.85;
  ctx.beginPath();
  ctx.arc(x, y, r * 0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  // Dashed halo ring so students can pick target out of the field
  ctx.strokeStyle = col;
  ctx.lineWidth = 1.2;
  ctx.globalAlpha = 0.55;
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.arc(x, y, r * 2.2, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

function drawRefLabel(letter, ref, showJan, showJul) {
  const col = 'rgba(110, 230, 255, 0.88)';
  ctx.save();
  ctx.fillStyle = col;
  ctx.strokeStyle = col;
  ctx.lineWidth = 1;
  ctx.font = '600 12px "JetBrains Mono", monospace';
  if (showJan) {
    drawSmallRing(ref.x, ref.y, 10, col);
    ctx.fillText(letter, ref.x + 12, ref.y - 8);
  }
  if (showJul) {
    const dx = state.julOffset.x + state.julDrag.x;
    const dy = state.julOffset.y + state.julDrag.y;
    drawSmallRing(ref.x + dx, ref.y + dy, 10, col);
  }
  ctx.restore();
}

function drawSmallRing(x, y, r, color) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.6;
  ctx.setLineDash([2, 2]);
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

function drawUserMarkers() {
  if (state.targetMark1) drawMarker(state.targetMark1, 'rgb(255, 107, 107)', '1');
  if (state.targetMark2) drawMarker(state.targetMark2, 'rgb(255, 107, 107)', '2');
  if (state.targetMark1 && state.targetMark2) {
    drawMeasurementLine(state.targetMark1, state.targetMark2, 'rgb(255, 107, 107)');
  }
  if (state.refMarkA) drawMarker(state.refMarkA, 'rgb(110, 230, 255)', 'A');
  if (state.refMarkB) drawMarker(state.refMarkB, 'rgb(110, 230, 255)', 'B');
  if (state.refMarkA && state.refMarkB) {
    drawMeasurementLine(state.refMarkA, state.refMarkB, 'rgb(110, 230, 255)');
  }
}

function drawMarker(pos, color, label) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(pos.x - 10, pos.y); ctx.lineTo(pos.x + 10, pos.y);
  ctx.moveTo(pos.x, pos.y - 10); ctx.lineTo(pos.x, pos.y + 10);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, 4, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = color;
  ctx.font = '600 11px "JetBrains Mono", monospace';
  ctx.fillText(label, pos.x + 12, pos.y + 12);
  ctx.restore();
}

function drawMeasurementLine(p1, p2, color) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.6;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
  ctx.stroke();

  const mx = (p1.x + p2.x) / 2;
  const my = (p1.y + p2.y) / 2;
  const dist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
  ctx.setLineDash([]);
  ctx.globalAlpha = 1.0;
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(mx - 28, my - 18, 56, 16);
  ctx.fillStyle = color;
  ctx.font = '600 10px "JetBrains Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(dist.toFixed(1) + ' px', mx, my - 6);
  ctx.textAlign = 'left';
  ctx.restore();
}

// ============================================================
// INTERACTIONS (mouse)
// ============================================================
function getMousePos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top)  * scaleY,
  };
}

function currentSnapTargets() {
  // Returns array of candidate snap positions for the current step.
  const s = state.scenario;
  if (!s) return [];
  const dx = state.julOffset.x + state.julDrag.x;
  const dy = state.julOffset.y + state.julDrag.y;
  const out = [];
  const showJan = state.blinkActive ? (state.blinkFrame === 'jan') : state.showJan;
  const showJul = state.blinkActive ? (state.blinkFrame === 'jul') : state.showJul;

  if (state.step === 4) {
    // Target markers only: Jan sprite + Jul sprite (offset-adjusted)
    if (showJan) out.push({ x: s.target_jan.x, y: s.target_jan.y });
    if (showJul) out.push({ x: s.target_jul.x + dx, y: s.target_jul.y + dy });
  } else if (state.step === 5) {
    // Reference stars (we snap most aggressively to the two known refs;
    // but also allow any bright DSS star).
    if (showJan) {
      out.push({ x: s.ref_A.x, y: s.ref_A.y, isRef: 'A' });
      out.push({ x: s.ref_B.x, y: s.ref_B.y, isRef: 'B' });
      for (const b of (s.bright_stars || [])) out.push({ x: b.x, y: b.y });
    }
    if (showJul) {
      out.push({ x: s.ref_A.x + dx, y: s.ref_A.y + dy, isRef: 'A' });
      out.push({ x: s.ref_B.x + dx, y: s.ref_B.y + dy, isRef: 'B' });
      for (const b of (s.bright_stars || [])) out.push({ x: b.x + dx, y: b.y + dy });
    }
  }
  return out;
}

function snapToNearestStar(pos, baseThreshold = 18) {
  // Canvas is rendered at CSS width; mouse/touch coords come back scaled up
  // to canvas coords.  A finger's imprecision in screen pixels therefore
  // translates to proportionally MORE canvas pixels on smaller viewports.
  // Adapt the threshold so touch users can still snap reliably.
  const rect = canvas.getBoundingClientRect();
  const scale = rect.width > 0 ? (canvas.width / rect.width) : 1;
  const touchBoost = state._lastInputWasTouch ? 1.4 : 1.0;
  const threshold = Math.min(72, baseThreshold * Math.max(1, scale) * touchBoost);
  const snaps = currentSnapTargets();
  let best = null, bestDist = threshold;
  for (const s of snaps) {
    const d = Math.hypot(s.x - pos.x, s.y - pos.y);
    if (d < bestDist) { bestDist = d; best = s; }
  }
  return best ? { x: best.x, y: best.y, snapped: true } : { ...pos, snapped: false };
}

function onCanvasMouseDown(e) {
  const pos = getMousePos(e);

  if (state.step === 3 && state.showJul) {
    state.isDraggingImage = true;
    state.dragStart = { x: pos.x, y: pos.y,
                        dragX: state.julDrag.x, dragY: state.julDrag.y };
    canvas.style.cursor = 'grabbing';
    return;
  }

  if (state.placingMode) {
    const snapped = snapToNearestStar(pos);
    const markPos = { x: snapped.x, y: snapped.y };
    if      (state.placingMode === 'target1') { state.targetMark1 = markPos; state.placingMode = 'target2'; }
    else if (state.placingMode === 'target2') { state.targetMark2 = markPos; state.placingMode = null;     }
    else if (state.placingMode === 'refA')    { state.refMarkA    = markPos; state.placingMode = 'refB';   }
    else if (state.placingMode === 'refB')    { state.refMarkB    = markPos; state.placingMode = null;     }
    renderAll();
  }
}

function onCanvasMouseMove(e) {
  if (state.isDraggingImage) {
    const pos = getMousePos(e);
    state.julDrag.x = state.dragStart.dragX + (pos.x - state.dragStart.x);
    state.julDrag.y = state.dragStart.dragY + (pos.y - state.dragStart.y);
    renderAll();
  }
}

function onCanvasMouseUp() {
  state.isDraggingImage = false;
  if (canvas) canvas.style.cursor = 'crosshair';
}

// ---- Unified pointer input (mouse + touch + pen) ---------------------------
// We use PointerEvents so there is ONE code path for all input devices, and no
// double-firing when a tap synthesises compatibility mouse events on iOS.
// Critically:
//   * outside step 3 the canvas has touch-action: manipulation, so a vertical
//     swipe that starts on the canvas still scrolls the page, and a two-finger
//     pinch still zooms the page.  Brief taps come through as pointerdown/up
//     for our mark-placement logic.
//   * inside step 3 we switch the canvas to touch-action: pinch-zoom and use
//     setPointerCapture so single-finger drag is fully owned by our JS and
//     doesn't fight the browser's pan gesture.
function onPointerDown(e) {
  // Only primary pointer (first finger / left mouse button / stylus tip).
  if (e.isPrimary === false) return;
  state._lastInputWasTouch = (e.pointerType === 'touch' || e.pointerType === 'pen');
  // In step 3 we claim the pointer so subsequent moves / ups route here even
  // if the finger slides off the canvas edge.
  if (state.step === 3 && state.showJul && state.imgReady) {
    try { canvas.setPointerCapture(e.pointerId); } catch (_) {}
    if (e.cancelable) e.preventDefault();
  }
  onCanvasMouseDown(e);
}
function onPointerMove(e) {
  if (!state.isDraggingImage) return;
  if (e.cancelable) e.preventDefault();
  onCanvasMouseMove(e);
}
function onPointerUp(e) {
  if (canvas.hasPointerCapture && canvas.hasPointerCapture(e.pointerId)) {
    try { canvas.releasePointerCapture(e.pointerId); } catch (_) {}
  }
  onCanvasMouseUp();
}

// ============================================================
// LAYOUT (landing vs scenario)
// ============================================================
function buildMainArea() {
  const main = document.getElementById('mainArea');
  main.innerHTML = '';
  if (state.mode === 'landing') {
    main.appendChild(buildLanding());
    return;
  }
  // Scenario layout: sidebar + workspace
  const aside = document.createElement('aside');
  aside.className = 'sidebar';
  aside.id = 'sidebar';
  main.appendChild(aside);

  const ws = document.createElement('div');
  ws.className = 'workspace';
  ws.innerHTML = `
    <div class="canvas-wrap">
      <canvas id="sky" width="800" height="500"></canvas>
      <div class="canvas-label" id="canvasLabel">Observation Field</div>
      <div class="canvas-status" id="canvasStatus"></div>
      <div class="canvas-attribution">DSS / STScI / AURA</div>
    </div>
    <div class="toolbar" id="toolbar"></div>
    <div id="dynamicPanel"></div>
  `;
  main.appendChild(ws);

  canvas = document.getElementById('sky');
  ctx = canvas.getContext('2d');
  // Single unified input path via PointerEvents — works for mouse, touch, pen.
  canvas.addEventListener('pointerdown',   onPointerDown);
  canvas.addEventListener('pointermove',   onPointerMove);
  canvas.addEventListener('pointerup',     onPointerUp);
  canvas.addEventListener('pointercancel', onPointerUp);
  canvas.addEventListener('pointerleave',  onPointerUp);
  // contextmenu on long-press (iOS) — suppress so long-press near a star
  // doesn't pop up the image save menu.
  canvas.addEventListener('contextmenu', (e) => e.preventDefault());
  // Apply initial touch-action for whichever step we're on.
  updateCanvasTouchAction();
}

// Switch the canvas between:
//   * step 3 (align)  → touch-action: pinch-zoom  (we own single-finger drag;
//                       browser keeps two-finger pinch-zoom)
//   * anything else   → touch-action: manipulation  (scroll + pinch both work;
//                       taps are instantaneous, no 300ms delay)
function updateCanvasTouchAction() {
  if (!canvas) return;

      </div>

        <div class="landing-col">

            <p class="desc">A step-by-step walkthrough with full explanations.

function showHowItWorks() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h2>How parallax works</h2>
      <p>As Earth orbits the Sun, nearby stars appear to shift against the
        much more distant background.  Six months apart, Earth's position
        shifts by <strong>2 AU</strong> — the diameter of its orbit — giving
        us a baseline to triangulate distance.</p>
      <p>If the total shift you measure (between January and July) is
        <code>2p</code> arcseconds, the <em>parallax angle</em> is
        <code>p = (2p) / 2</code>.  The distance in parsecs is simply
        <code>d = 1 / p</code> when <code>p</code> is measured in arcseconds.</p>
      <p>Each pixel shift you measure must first be converted into arcseconds
        using the <strong>plate scale</strong> of the image.  We derive the
        plate scale from two reference stars whose angular separation is
        known from star catalogues (Gaia DR3).</p>
      <p><strong>Proper motion.</strong>  In real observations, a nearby star
        also drifts steadily across the sky because of its own motion through
        the galaxy.  Over six months this linear drift swamps the tiny parallax
        wobble.  Astronomers separate the two by taking many observations over
        several years and fitting both effects together.  For this simulation
        we have removed the proper motion for you — the shift you see is
        pure parallax.</p>
      <p><strong>About the imagery.</strong>  Each star field is a real DSS2
        red-filter plate taken by the UK Schmidt or Palomar telescopes.
        Native resolution is ~1.5″/pixel, at which real stellar parallax
        is sub-pixel. We show these real fields as authentic backdrops and
        declare a per-scenario effective plate scale that makes parallax
        shifts measurable while keeping the calculation internally correct
        — a student's perfect measurement recovers the catalogued distance
        to &lt; 0.01 %.</p>
      <button class="primary modal-close" onclick="this.closest('.modal-overlay').remove()">Close</button>
    </div>
  `;
  document.querySelector('.app').appendChild(overlay);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
}

  const el = document.getElementById('sidebar');
  if (!el) return;
  const content = stepContent();
  if (!content) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div class="step-label">${content.label}</div>
    <h2>${content.title}</h2>
    ${content.body}
    <div class="nav-buttons">
      <button onclick="goToStep(state.step - 1)" ${state.step === 1 ? 'disabled' : ''}>← Back</button>
      ${state.step < 7 ? `<button class="primary" onclick="nextStep()" id="nextBtn">${
        state.step === 1 ? 'Begin →' : state.step === 6 ? 'Check answer' : 'Next →'
      }</button>` : ''}
    </div>
  `;
}

function renderHeaderMeta() {
  const el = document.getElementById('headerMeta');
  if (!el) return;
  if (state.mode === 'landing' || !state.scenario) {
    el.innerHTML = '';
    return;
  }
  const s = state.scenario;
  const badge = state.mode === 'walkthrough' ? 'Walkthrough' : 'Practice';
  el.innerHTML = `
    <button class="home-btn" onclick="goHome()">← Home</button>
    <span class="scenario-chip">${badge} · ${s.display_name}</span>
  `;
}

function renderStepIndicator() {
  const el = document.getElementById('stepIndicator');
  if (!el) return;
  if (state.mode === 'landing') { el.innerHTML = ''; return; }
  el.innerHTML = '';
  for (let i = 1; i <= 6; i++) {
    if (i > 1) {
      const c = document.createElement('div');
      c.className = 'step-connector';
      el.appendChild(c);
    }
    const d = document.createElement('button');
    d.className = 'step-dot';
    if (i === state.step) d.classList.add('active');
    if (i < state.step || i <= state.maxStep) d.classList.add('completed');
    d.textContent = i;
    d.onclick = () => { if (i <= state.maxStep) goToStep(i); };
    el.appendChild(d);
  }
}

function renderToolbar() {
  const el = document.getElementById('toolbar');
  if (!el) return;
  el.innerHTML = '';

  if (state.step >= 2) {
    const blinkBtn = document.createElement('button');
    blinkBtn.className = state.blinkActive ? 'active' : '';
    blinkBtn.innerHTML = '◉ Blink';
    blinkBtn.onclick = toggleBlink;
    el.appendChild(blinkBtn);
  }

  if (state.step >= 2 && !state.blinkActive) {
    const janBtn = document.createElement('button');
    janBtn.className = state.showJan ? 'active' : 'ghost';
    janBtn.innerHTML = `<span style="color: var(--jan-color)">●</span> January`;
    janBtn.onclick = () => { state.showJan = !state.showJan; renderAll(); };
    el.appendChild(janBtn);

    const julBtn = document.createElement('button');
    julBtn.className = state.showJul ? 'active' : 'ghost';
    julBtn.innerHTML = `<span style="color: var(--jul-color)">●</span> July`;
    julBtn.onclick = () => { state.showJul = !state.showJul; renderAll(); };
    el.appendChild(julBtn);
  }

  if (state.step === 3) {
    const divider = document.createElement('div');
    divider.className = 'divider'; el.appendChild(divider);

    const resetBtn = document.createElement('button');
    resetBtn.textContent = 'Reset alignment';
    resetBtn.onclick = () => { state.julDrag = { x: 0, y: 0 }; renderAll(); };
    el.appendChild(resetBtn);

    const autoBtn = document.createElement('button');
    autoBtn.className = 'ghost';
    autoBtn.textContent = '⚡ Auto-align';
    autoBtn.onclick = () => {
      state.julDrag = { x: -state.julOffset.x, y: -state.julOffset.y };
      renderAll();
    };
    el.appendChild(autoBtn);
  }

  if (state.step === 4) {
    const divider = document.createElement('div');
    divider.className = 'divider'; el.appendChild(divider);
    const markBtn = document.createElement('button');
    markBtn.className = state.placingMode && state.placingMode.startsWith('target') ? 'active' : '';
    markBtn.textContent = state.placingMode === 'target1' ? 'Click January target…' :
                          state.placingMode === 'target2' ? 'Click July target…' :
                          '✛ Mark target star positions';
    markBtn.onclick = () => {
      state.targetMark1 = null; state.targetMark2 = null;
      state.placingMode = 'target1'; renderAll();
    };
    el.appendChild(markBtn);
    if (state.targetMark1 || state.targetMark2) {
      const clearBtn = document.createElement('button');
      clearBtn.className = 'ghost'; clearBtn.textContent = 'Clear markers';
      clearBtn.onclick = () => {
        state.targetMark1 = null; state.targetMark2 = null;
        state.placingMode = null; renderAll();
      };
      el.appendChild(clearBtn);
    }
  }

  if (state.step === 5) {
    const divider = document.createElement('div');
    divider.className = 'divider'; el.appendChild(divider);
    const markBtn = document.createElement('button');
    markBtn.className = state.placingMode && state.placingMode.startsWith('ref') ? 'active' : '';
    markBtn.textContent = state.placingMode === 'refA' ? 'Click reference star A…' :
                          state.placingMode === 'refB' ? 'Click reference star B…' :
                          '✛ Mark reference stars';
    markBtn.onclick = () => {
      state.refMarkA = null; state.refMarkB = null;
      state.placingMode = 'refA'; renderAll();

    el.appendChild(markBtn);
    if (state.refMarkA || state.refMarkB) {
      const clearBtn = document.createElement('button');
      clearBtn.className = 'ghost'; clearBtn.textContent = 'Clear markers';
      clearBtn.onclick = () => {
        state.refMarkA = null; state.refMarkB = null;
        state.placingMode = null; renderAll();
      };
      el.appendChild(clearBtn);
    }
  }
}

function renderDynamicPanel() {
  const el = document.getElementById('dynamicPanel');
  if (!el) return;
  el.innerHTML = '';
  if (state.step >= 3 && state.step <= 5) {
    el.innerHTML = renderReadout();
  }
  if (state.step === 6) {
    el.innerHTML = renderCalculation();
    attachCalcHandlers();
  }
  if (state.step === 7) {
    el.innerHTML = renderResults();
  }
}

function renderReadout() {
  const s = state.scenario;
  const targetShift = (state.targetMark1 && state.targetMark2)
    ? Math.hypot(state.targetMark2.x - state.targetMark1.x,
                 state.targetMark2.y - state.targetMark1.y)
    : null;
  const refSep = (state.refMarkA && state.refMarkB)
    ? Math.hypot(state.refMarkB.x - state.refMarkA.x,
                 state.refMarkB.y - state.refMarkA.y)
    : null;
  const alignErr = Math.hypot(state.julOffset.x + state.julDrag.x,
                              state.julOffset.y + state.julDrag.y);
  return `
    <div class="readout">
      <div>
        <div class="measurement-label">Alignment residual</div>
        <div class="measurement-value ${alignErr < 3 ? 'highlight' : ''}">
          ${alignErr.toFixed(1)} px ${alignErr < 3 ? '✓' : ''}
        </div>
      </div>
      <div>
        <div class="measurement-label">Target shift</div>
        <div class="measurement-value ${targetShift ? 'highlight' : 'dim'}">
          ${targetShift !== null ? targetShift.toFixed(2) + ' px' : '— not measured'}
        </div>
      </div>
      <div>
        <div class="measurement-label">Reference separation</div>
        <div class="measurement-value ${refSep ? 'highlight' : 'dim'}">
          ${refSep !== null ? refSep.toFixed(2) + ' px' : '— not measured'}
        </div>
      </div>
      <div>
        <div class="measurement-label">Known θ<sub>AB</sub></div>
        <div class="measurement-value">${s.ref_sep_arcsec.toFixed(2)} arcsec</div>
      </div>
    </div>`;
}

function renderCalculation() {
  const s = state.scenario;
  if (!state.targetMark1 || !state.targetMark2 || !state.refMarkA || !state.refMarkB) {
    return `
      <div class="calc-panel">
        <h3>Calculation Pipeline</h3>
        <p style="color: var(--danger);">Measurements missing — complete steps 4 and 5.</p>
      </div>`;
  }
  const targetShift = Math.hypot(state.targetMark2.x - state.targetMark1.x,
                                 state.targetMark2.y - state.targetMark1.y);
  const refSep = Math.hypot(state.refMarkB.x - state.refMarkA.x,
                            state.refMarkB.y - state.refMarkA.y);
  const knownArcsec = s.ref_sep_arcsec;
  const plateScale = knownArcsec / refSep;
  const totalShift = targetShift * plateScale;
  const parallax = totalShift / 2;
  const distance = 1 / parallax;
  state._computed = { plateScale, totalShift, parallax, distance };

  return `
    <div class="calc-panel">
      <h3>Calculation Pipeline</h3>
      <div class="calc-step">
        <div class="calc-label">Plate scale</div>
        <div class="calc-formula">
          <span class="var">θ<sub>AB</sub></span> / <span class="var">px<sub>AB</sub></span>
          = <span class="num">${knownArcsec.toFixed(2)}</span> / <span class="num">${refSep.toFixed(2)}</span>
        </div>
        <div class="calc-result">${plateScale.toFixed(4)} arcsec/px</div>
      </div>
      <div class="calc-step">
        <div class="calc-label">Total angular shift</div>
        <div class="calc-formula">
          <span class="var">px<sub>target</sub></span> × <span class="var">plate scale</span>
          = <span class="num">${targetShift.toFixed(2)}</span> × <span class="num">${plateScale.toFixed(4)}</span>
        </div>
        <div class="calc-result">${totalShift.toFixed(4)} arcsec</div>
      </div>
      <div class="calc-step">
        <div class="calc-label">Parallax angle <code>p</code></div>
        <div class="calc-formula">
          <span class="var">total shift</span> / 2
          = <span class="num">${totalShift.toFixed(4)}</span> / 2
        </div>
        <div class="calc-result">${parallax.toFixed(4)} arcsec</div>
      </div>
      <div class="calc-step">
        <div class="calc-label">Distance (parsecs)</div>
        <div class="calc-formula">
          1 / <span class="var">p</span>
          = 1 / <span class="num">${parallax.toFixed(4)}</span>
        </div>
        <div class="calc-result">${distance.toFixed(2)} pc</div>
      </div>
      <div class="input-row">
        <label for="distanceInput">Your answer for distance (pc):</label>
        <input type="number" id="distanceInput" step="0.01"
               placeholder="${distance.toFixed(2)}"
               value="${state.studentDistance !== null ? state.studentDistance : ''}">
        <button class="primary" onclick="submitAnswer()">Submit →</button>
      </div>
      <p style="color: var(--text-muted); font-size: 0.82rem; margin-top: 0.75rem;">
        The pipeline does the arithmetic for you — enter the final distance to lock in your answer.
      </p>
    </div>`;
}

function renderResults() {
  const s = state.scenario;
  const trueD = 1 / s.parallax_arcsec;
  const studentD = state.studentDistance;
  const err_pc = Math.abs(studentD - trueD);
  const err_pct = (err_pc / trueD) * 100;
  let verdict;
  if (err_pct < 5)      verdict = '✓ Excellent — within 5% of the catalogued value.';
  else if (err_pct < 15) verdict = '✓ Good — within measurement tolerance.';
  else if (err_pct < 30) verdict = '⚠ Noticeable error — try a more careful measurement?';
  else                   verdict = '⚠ Large error — re-run the measurement steps.';

  const contextBlock = (state.mode === 'walkthrough') ? `
    <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border);">
      <h4 style="color: var(--accent-soft); margin-bottom: 0.6rem; font-family: 'Fraunces', serif; font-weight: 500;">
        Real-world context
      </h4>
      <p style="color: var(--text); line-height: 1.55; font-size: 0.9rem;">
        The Gaia mission measured Barnard's parallax to ~<strong>0.02&thinsp;mas</strong> precision —
        roughly <strong>25&thinsp;000×</strong> better than a school-level measurement. Gaia achieves this with a
        spacecraft designed for astrometry: two mirrors on a common focal plane, continuous
        scanning, and precise rotation over years to fit the parallax ellipse and
        proper motion together.
      </p>
    </div>` : '';

  return `
    <div class="result-panel">
      <h3>Results · ${s.display_name}</h3>
      <div class="result-card">
        <div class="result-tile student">
          <div class="label">Your answer</div>
          <div class="value">${studentD.toFixed(2)} pc</div>
        </div>
        <div class="result-tile truth">
          <div class="label">Catalogued distance</div>
          <div class="value">${trueD.toFixed(2)} pc</div>
        </div>
      </div>
      <div class="error-bar">
        Error: <span class="error-value">${err_pc.toFixed(2)} pc (${err_pct.toFixed(1)}%)</span>
        &nbsp;·&nbsp; ${verdict}
      </div>
      ${contextBlock}
      <div style="margin-top: 1.3rem; padding-top: 1.3rem; border-top: 1px solid var(--border);">
        <h4 style="color: var(--accent-soft); margin-bottom: 0.5rem; font-family: 'Fraunces', serif; font-weight: 500;">
          Where did the error come from?
        </h4>
        <ul style="color: var(--text); line-height: 1.55; margin-left: 1.1rem; font-size: 0.9rem;">
          <li><strong>Alignment residual:</strong> did the background stars line up exactly?</li>
          <li><strong>Marker placement:</strong> did the crosshair land on the actual star centre?</li>
          <li><strong>Reference separation:</strong> any error in the calibration doubles into the final distance.</li>
        </ul>
      </div>
      <div style="margin-top: 1.2rem; display: flex; gap: 0.5rem; flex-wrap: wrap;">
        <button onclick="goHome()">↻ Pick another star</button>
        <button class="ghost" onclick="goToStep(3); renderAll();">← Re-measure this one</button>
      </div>
    </div>`;
}

function attachCalcHandlers() {
  const input = document.getElementById('distanceInput');
  if (input) {
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') submitAnswer();
    });
  }
}

function updateCanvasStatus() {
  const labelEl = document.getElementById('canvasLabel');
  const el = document.getElementById('canvasStatus');
  if (!labelEl || !el) return;

  if (state.step === 1) {
    labelEl.textContent = 'Preview · ' + (state.scenario?.display_name || '');
    el.textContent = ''; el.className = 'canvas-status';
  } else if (state.step === 2) {
    labelEl.textContent = state.blinkActive
      ? (state.blinkFrame === 'jan' ? 'January · blue' : 'July · amber')
      : 'Both epochs overlaid';
    el.textContent = ''; el.className = 'canvas-status';
  } else if (state.step === 3) {
    labelEl.textContent = 'Align by dragging';
    const err = Math.hypot(state.julOffset.x + state.julDrag.x,
                           state.julOffset.y + state.julDrag.y);
    if (err < 3) {
      el.textContent = '✓ ALIGNED'; el.className = 'canvas-status aligned';
    } else {
      el.textContent = `residual: ${err.toFixed(1)} px`;
      el.className = 'canvas-status misaligned';
    }
  } else if (state.step === 4) {
    labelEl.textContent = 'Measuring target shift';
    el.textContent = state.placingMode === 'target1' ? 'Click January target' :
                     state.placingMode === 'target2' ? 'Click July target' :
                     (state.targetMark1 && state.targetMark2) ? '✓ measured' : 'ready';
    el.className = 'canvas-status' + (state.targetMark1 && state.targetMark2 ? ' aligned' : '');
  } else if (state.step === 5) {
    labelEl.textContent = 'Calibrating plate scale';
    el.textContent = state.placingMode === 'refA' ? 'Click reference star A' :
                     state.placingMode === 'refB' ? 'Click reference star B' :
                     (state.refMarkA && state.refMarkB) ? '✓ measured' : 'ready';
    el.className = 'canvas-status' + (state.refMarkA && state.refMarkB ? ' aligned' : '');
  } else if (state.step === 6) {
    labelEl.textContent = 'Final measurement';
    el.textContent = ''; el.className = 'canvas-status';
  } else {
    labelEl.textContent = 'Results';
    el.textContent = ''; el.className = 'canvas-status';
  }
}

// ============================================================
// NAVIGATION
// ============================================================
function canAdvance() {
  if (state.step === 3) {
    const err = Math.hypot(state.julOffset.x + state.julDrag.x,
                           state.julOffset.y + state.julDrag.y);
    return err < 15;
  }
  if (state.step === 4) return state.targetMark1 && state.targetMark2;
  if (state.step === 5) return state.refMarkA && state.refMarkB;
  if (state.step === 6) return state.studentDistance !== null && !isNaN(state.studentDistance);
  return true;
}

function nextStep() {
  if (!canAdvance()) {
    if (state.step === 3)      alert('Please align the images more closely before proceeding.');
    else if (state.step === 4) alert('Please mark both target star positions first.');
    else if (state.step === 5) alert('Please mark both reference stars first.');
    else if (state.step === 6) alert('Please enter your answer for the distance.');
    return;
  }
  if (state.step === 6) { submitAnswer(); return; }
  goToStep(state.step + 1);
}

function goToStep(n) {
  if (n < 1 || n > 7) return;
  state.step = n;
  if (n > state.maxStep) state.maxStep = n;
  if (state.blinkActive) toggleBlink();
  if (n === 3 || n === 4 || n === 5) {
    state.showJan = true; state.showJul = true;
  }
  state.placingMode = null;
  updateCanvasTouchAction();
  renderAll();
}

function submitAnswer() {
  const input = document.getElementById('distanceInput');
  if (!input) return;
  const val = parseFloat(input.value);
  if (isNaN(val)) { alert('Please enter a numeric value.'); return; }
  state.studentDistance = val;
  goToStep(7);
}

function toggleBlink() {
  state.blinkActive = !state.blinkActive;
  if (state.blinkActive) {
    blinkInterval = setInterval(() => {
      state.blinkFrame = state.blinkFrame === 'jan' ? 'jul' : 'jan';
      renderAll();
    }, 600);
  } else {
    clearInterval(blinkInterval);
    blinkInterval = null;
  }
  renderAll();
}

// ============================================================
// MAIN RENDER
// ============================================================
function renderAll() {
  renderHeaderMeta();
  renderStepIndicator();
  if (state.mode === 'landing') return;
  renderSidebar();
  renderToolbar();
  renderDynamicPanel();
  renderStarField();
  updateCanvasStatus();
}

// ============================================================
// SELF-TEST (console on page load)
// ============================================================
function runSelfTest() {
  console.group('%cParallax Lab · self-test', 'color:#ffd060; font-weight:bold');
  console.log('Verifying that a perfect measurement recovers the catalogued distance for each scenario…');
  let allPass = true;
  for (const s of MANIFEST.stars) {
    const trueD = 1 / s.parallax_arcsec;
    // Simulate perfect measurement
    const shift_px = s.target_shift_px;
    const ref_px   = s.ref_sep_px;
    const plate    = s.ref_sep_arcsec / ref_px;
    const totalSh  = shift_px * plate;
    const parallax = totalSh / 2;
    const dist     = 1 / parallax;
    const err_pct  = Math.abs(dist - trueD) / trueD * 100;
    const pass = err_pct < 1.0;
    allPass = allPass && pass;
    console.log(`  %c${pass ? '✓' : '✗'} ${s.display_name.padEnd(18)} ` +
                `recovered ${dist.toFixed(4)} pc  vs true ${trueD.toFixed(4)} pc  ` +
                `(${err_pct.toFixed(4)}% error)`,
                pass ? 'color:#6ee69e' : 'color:#ff6b6b');
  }
  console.log(allPass
    ? '%cAll scenarios pass within 1% ✓'
    : '%cSOME SCENARIOS FAILED',
    allPass ? 'color:#6ee69e; font-weight:bold' : 'color:#ff6b6b; font-weight:bold');
  console.groupEnd();
  return allPass;
}

// ============================================================
// INIT
// ============================================================
function init() {
  runSelfTest();
  document.getElementById('footerRight').textContent =
    `${MANIFEST.stars.length} scenarios loaded`;
  buildMainArea();
  renderAll();
}

window.addEventListener('load', init);
// Expose for inline handlers
window.state = state;
window.goToStep = goToStep;
window.nextStep = nextStep;
window.submitAnswer = submitAnswer;
window.goHome = goHome;
window.renderAll = renderAll;
</script>

</body>
</html>
